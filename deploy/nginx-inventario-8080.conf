# Inventario RM — porta dedicada (coexiste com outros sistemas na porta 80)
server {
    listen __INVENTARIO_PORT__;
    listen [::]:__INVENTARIO_PORT__;
    server_name 172.20.0.43 h9jpvhweb04;

    root /var/www/inventario;
    index index.php;

    access_log /var/log/nginx/inventario-rm-access.log;
    error_log /var/log/nginx/inventario-rm-error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
