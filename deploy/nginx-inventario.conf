server {
    listen 80;
    listen [::]:80;
    server_name 172.20.0.43 h9jpvhweb04;

    root /var/www/inventario;
    index index.php;

    access_log /var/log/nginx/inventario-access.log;
    error_log /var/log/nginx/inventario-error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
